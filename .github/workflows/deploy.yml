# Docs CI + GitHub Pages deploy.
#
# Pull requests: the build must pass — Docusaurus fails on broken
# links/anchors and on missing images referenced from docs.
#
# Push to master: build and publish to GitHub Pages via the official Pages
# actions (Pages source must be set to "GitHub Actions").
#
# The GitBook-parity gate was removed on 2026-07-10 when intentional content
# editing began; this repo is the source of truth now. The scripts and the
# frozen snapshot remain under scripts/ for historical reference.
name: deploy

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build (fails on broken links/anchors)
        run: npm run build

      # The site lives at https://docs.tbook.com/tbook/ (baseUrl /tbook/) so
      # every URL matches the original GitBook space. The Pages artifact root
      # maps to the domain root, so nest the build under tbook/, serve the
      # 404 from the root (GitHub Pages only reads /404.html), and redirect
      # the bare domain root to /tbook/ like GitBook did.
      - name: Package Pages artifact (site under /tbook/, root redirect)
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          mkdir -p site/tbook
          cp -R build/. site/tbook/
          cp build/404.html site/404.html
          cp .github/pages-root/index.html site/index.html

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
